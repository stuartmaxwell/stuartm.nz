{% extends "_base.html" %}
{% load static %}
{% block title %}Home{% endblock %}
{% block head_close %}
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background-image: url('{% static "img/wallpaper/dark-ferns-hnysCJrPpkc.jpeg" %}');
      background-position: center;
      background-size: cover;
      background-repeat: no-repeat;
      font-family: system-ui, -apple-system, sans-serif;
    }

    main {
      padding: 2rem;
      border-radius: 1rem;
      background-color: rgba(0, 0, 0, 0.5);
    }

    time {
      color: var(--bs-gray-500);
      font-weight: bold;
      font-size: 4rem;
    }

    div#date {
      color: var(--bs-gray-500);
    }
  </style>
{% endblock head_close %}
{% block header %}{% endblock %}
{% block main %}
  <time id="clock"></time>
  <div id="date"></div>
{% endblock main %}
{% block body_close %}{% endblock %}
{% block js_body_close %}
  <script>
    function updateClock() {
        const now = new Date();
        const baseTitle = "Home";

        const timeOptions = {
            hour12: false,
            hour: '2-digit',
            minute: '2-digit'
        };
        const timeStr = now.toLocaleTimeString('en-NZ', timeOptions);

        const dateOptions = {
            weekday: 'long',
            month: 'short',
            day: 'numeric'
        };
        const dateStr = now.toLocaleDateString('en-NZ', dateOptions);

        document.getElementById('clock').textContent = timeStr;
        document.getElementById('date').textContent = dateStr;
        document.title = `Home ${timeStr}`;

    }

    updateClock();
    setInterval(updateClock, 1000);
  </script>
{% endblock js_body_close %}
